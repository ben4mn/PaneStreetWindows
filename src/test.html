<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PaneStreet Feature Tests</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Cascadia Code', monospace; padding: 20px; }
    h1 { color: #2a6df0; }
    .suite { margin: 16px 0; padding: 12px; background: #222; border-radius: 6px; }
    .suite h2 { margin: 0 0 8px; font-size: 14px; color: #b0b0b0; }
    .test { padding: 4px 8px; margin: 2px 0; border-radius: 3px; font-size: 13px; }
    .pass { background: #1a3a1a; color: #4ade80; }
    .fail { background: #3a1a1a; color: #ef4444; }
    .summary { margin-top: 20px; font-size: 16px; padding: 12px; border-radius: 6px; }
    .summary.all-pass { background: #1a3a1a; color: #4ade80; }
    .summary.has-fail { background: #3a1a1a; color: #ef4444; }
  </style>
</head>
<body>
  <h1>PaneStreet Feature Tests</h1>
  <div id="results"></div>
  <div id="summary"></div>

  <!-- Load app scripts to test feature presence -->
  <script src="js/tests.js"></script>
  <script>
    const results = document.getElementById('results');
    const summary = document.getElementById('summary');
    let passed = 0, failed = 0;

    function suite(name, tests) {
      const div = document.createElement('div');
      div.className = 'suite';
      div.innerHTML = `<h2>${name}</h2>`;
      tests.forEach(([desc, fn]) => {
        const el = document.createElement('div');
        try {
          const result = fn();
          if (result) {
            el.className = 'test pass';
            el.textContent = `PASS: ${desc}`;
            passed++;
          } else {
            el.className = 'test fail';
            el.textContent = `FAIL: ${desc}`;
            failed++;
          }
        } catch (e) {
          el.className = 'test fail';
          el.textContent = `FAIL: ${desc} — ${e.message}`;
          failed++;
        }
        div.appendChild(el);
      });
      results.appendChild(div);
    }

    // Run all test suites
    PaneStreetTests.run(suite);

    // Summary
    const total = passed + failed;
    summary.className = `summary ${failed > 0 ? 'has-fail' : 'all-pass'}`;
    summary.textContent = `${passed}/${total} tests passed${failed > 0 ? ` (${failed} failed)` : ' — All green!'}`;
  </script>
</body>
</html>
