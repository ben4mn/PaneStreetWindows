name: Debug Build 3
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm run vendor
      - name: Build and capture error
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: pwsh
        run: |
          try {
            npx tauri build 2>&1 | Tee-Object -FilePath build-output.txt
          } catch {
            Write-Host "Build failed"
          }
          Write-Host "=== LAST 100 LINES ==="
          Get-Content build-output.txt | Select-Object -Last 100
          Write-Host "=== ERROR LINES ==="
          Get-Content build-output.txt | Select-String -Pattern "error|Error|failed|signing|password|invalid|NSIS" | Select-Object -Last 30
          exit 0
      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build-output.txt
          if-no-files-found: warn
