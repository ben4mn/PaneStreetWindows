name: Debug Build 4
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: windows-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm run vendor
      - name: Build and post error
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          npx tauri build 2>&1 | tee build.log || true
          echo "=== BUILD LOG TAIL ==="
          tail -80 build.log
          echo "=== ERROR LINES ==="
          grep -i "error\|failed\|signing\|password\|invalid\|NSIS\|fatal" build.log | tail -30 || echo "No error lines found"
          
          # Post as issue comment
          BODY=$(tail -80 build.log | head -c 60000)
          gh issue create --title "Debug: build log output" --body "\`\`\`
          $BODY
          \`\`\`" || echo "Could not create issue"
