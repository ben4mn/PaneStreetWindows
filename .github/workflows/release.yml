name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g., v0.6.0)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag ${{ github.event.inputs.tag }}
          git push origin ${{ github.event.inputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: release-v3

      - name: Install frontend dependencies
        run: npm ci

      - name: Vendor JS dependencies
        run: npm run vendor

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: PaneStreet ${{ github.event.inputs.tag || github.ref_name }}
          body: |
            ## What's New

            - Mac mascot visual redesign (bigger, curved antenna, ears, 4 mouth expressions, broom prop)
            - 6 new mascot animations (shimmy, antenna-fix, yawn, startled, hiccup, impressed)
            - Mascot personality system (speech budget, stare-back detection, hiccup scheduling, command milestones)
            - Auto-tile panes (Ctrl+Shift+T)
            - Claude Code hooks integration (install/uninstall from Settings)
            - File path link provider (Ctrl+click paths in terminal)
            - Mascot sidebar snapping (drag mascot to sidebar)
            - Notification panel now properly overlays terminal

            Co-Authored-By: Claude <noreply@anthropic.com>
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.sig

      - name: Upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $version = $tag -replace '^v', ''
          $nsisDir = "src-tauri\target\release\bundle\nsis"
          $exeFile = Get-ChildItem $nsisDir -Filter "*.exe" | Where-Object { $_.Name -notmatch '\.sig$' } | Select-Object -First 1
          $sigContent = Get-Content "$nsisDir\$($exeFile.Name).sig" -Raw
          $url = "https://github.com/ben4mn/PaneStreetWindows/releases/download/$tag/$($exeFile.Name)"
          $json = @{
            version = $version
            notes = "Update to $tag"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $sigContent.Trim()
                url = $url
              }
            }
          } | ConvertTo-Json -Depth 5
          $json | Out-File -FilePath "latest.json" -Encoding utf8
          gh release upload $tag latest.json --clobber
