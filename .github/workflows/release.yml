name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g., v0.6.0)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Create tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag ${{ github.event.inputs.tag }}
          git push origin ${{ github.event.inputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Vendor JS dependencies
        run: npm run vendor

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: PaneStreet ${{ github.event.inputs.tag || github.ref_name }}
          releaseBody: |
            ## What's New

            - Mac mascot visual redesign (bigger, curved antenna, ears, 4 mouth expressions, broom prop)
            - 6 new mascot animations (shimmy, antenna-fix, yawn, startled, hiccup, impressed)
            - Mascot personality system (speech budget, stare-back detection, hiccup scheduling, command milestones)
            - Auto-tile panes (Ctrl+Shift+T)
            - Claude Code hooks integration (install/uninstall from Settings)
            - File path link provider (Ctrl+click paths in terminal)
            - Mascot sidebar snapping (drag mascot to sidebar)
            - Notification panel now properly overlays terminal

            Co-Authored-By: Claude <noreply@anthropic.com>
          releaseDraft: false
          prerelease: false
