name: Debug Build 5
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: windows-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run vendor
      - name: Build and post error
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          rm -f src-tauri/Cargo.lock
          npx tauri build 2>&1 | tee build.log; BUILD_EXIT=$?
          BODY=$(tail -100 build.log | head -c 60000)
          ERROR_LINES=$(grep -i "error\|failed\|signing\|password\|invalid\|NSIS\|fatal" build.log | tail -30)
          gh issue create --title "Debug 5: build log (exit=$BUILD_EXIT)" --body "$(cat <<EOFISSUE
\`\`\`
EXIT CODE: $BUILD_EXIT

=== ERROR LINES ===
$ERROR_LINES

=== LAST 100 LINES ===
$BODY
\`\`\`
EOFISSUE
)" || echo "Could not create issue"
          exit 0
